<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Content Editor</title>

<style>
body{
  margin:0;
  background:#0f1115;
  font-family:Inter,Arial;
}

/* ÜST BAR */
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:60px;
  background:#151922;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:0 20px;
  z-index:10;
}

button{
  background:#2f6df6;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  cursor:pointer;
}

/* PREVIEW */
.preview{
  margin-top:80px;
  padding:20px;
}

.editor-wrap{
  background:#fff;
  border-radius:16px;
  padding:20px;
}

/* === SENİN AÇIKLAMA CSS'İN === */
.product-detail-section {
  background-color: #FFFFFF;
  line-height: 1.6;
  font-family: Arial, sans-serif;
}

.product-detail-section [class^="paragraph-"] {
  display: flex;
  align-items: center;
  gap: 30px;
  padding: 15px;
  color: #000000;
  margin: 20px 0;
  background-color: #F2F2F2;
  border-radius: 10px;
}

.product-detail-section h1,
.product-detail-section h2 {
  font-size: 24px;
}

.product-detail-section p {
  font-size: 16px;
}

.product-detail-section img {
  width: 500px;
  max-width: 100%;
  border-radius: 10px;
}

/* yönler */
.paragraph-1{flex-direction:row-reverse}
.paragraph-2{flex-direction:row}
.paragraph-3{flex-direction:row-reverse}
.paragraph-4{flex-direction:row}

/* editable focus */
[contenteditable]:focus{
  outline:2px solid #2f6df6;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="copyCode()">Kodu Kopyala</button>
</div>

<div class="preview">
<div class="editor-wrap">

<div id="editor" class="product-detail-section" contenteditable="true">

<div class="paragraph-1">
<div class="product-info">
<h1>Başlığa tıkla düzenle</h1>
<p>Metni tıkla ve düzenle</p>
</div>
<img src="https://placehold.co/500x500">
</div>

<div class="paragraph-2">
<div class="product-info">
<h2>Başlık</h2>
<p>Metin</p>
</div>
<img src="https://placehold.co/500x500">
</div>

<div class="paragraph-3">
<div class="product-info">
<h2>Başlık</h2>
<p>Metin</p>
</div>
<img src="https://placehold.co/500x500">
</div>

<div class="paragraph-4">
<div class="product-info">
<h2>Başlık</h2>
<p>Metin</p>
</div>
<img src="https://placehold.co/500x500">
</div>

</div>

</div>
</div>

<script>
function copyCode(){
  const html = `
<style>
.product-detail-section {
  background-color: #FFFFFF;
  line-height: 1.6;
  font-family: Arial, sans-serif;
}
.product-detail-section [class^="paragraph-"] {
  display: flex;
  gap: 30px;
  padding: 15px;
  margin: 20px 0;
  background-color: #F2F2F2;
  border-radius: 10px;
}
.product-detail-section img {
  width: 500px;
  max-width: 100%;
  border-radius: 10px;
}
.paragraph-1{flex-direction:row-reverse}
.paragraph-2{flex-direction:row}
.paragraph-3{flex-direction:row-reverse}
.paragraph-4{flex-direction:row}
</style>

<div class="product-detail-section">
${document.getElementById("editor").innerHTML}
</div>
`;

  navigator.clipboard.writeText(html);
  alert("Kopyalandı");
}
</script>

</body>
</html>
