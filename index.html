<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Live Editor</title>

<style>
body{
  margin:0;
  background:#111;
  color:#fff;
  font-family:Arial;
}

.topbar{
  padding:10px;
  background:#1a1a1a;
  position:sticky;
  top:0;
  display:flex;
  justify-content:flex-end;
}

button{
  padding:10px 15px;
  background:#2f6df6;
  color:#fff;
  border:none;
  cursor:pointer;
}

#editor{
  background:#fff;
  color:#000;
  padding:20px;
}

/* SENİN CSS */
.product-detail-section {
  background:#fff;
  font-family:sans-serif;
}

.product-detail-section [class^="paragraph-"]{
  display:flex;
  gap:20px;
  margin:20px 0;
  background:#f2f2f2;
  padding:15px;
  border-radius:10px;
}

.product-detail-section img{
  width:300px;
}

</style>
</head>

<body>

<div class="topbar">
  <button onclick="copyHTML()">Kodu Kopyala</button>
</div>

<div id="editor" contenteditable="true">

<div class="product-detail-section">

<div class="paragraph-1" style="flex-direction:row-reverse">
<div>
<h1>Başlığa tıkla düzenle</h1>
<p>Metne tıkla düzenle</p>
</div>
<img src="https://placehold.co/300x300">
</div>

<div class="paragraph-2">
<div>
<h2>Başlık</h2>
<p>Metin</p>
</div>
<img src="https://placehold.co/300x300">
</div>

<div class="paragraph-3" style="flex-direction:row-reverse">
<div>
<h2>Başlık</h2>
<p>Metin</p>
</div>
<img src="https://placehold.co/300x300">
</div>

<div class="paragraph-4">
<div>
<h2>Başlık</h2>
<p>Metin</p>
</div>
<img src="https://placehold.co/300x300">
</div>

</div>

</div>

<script>
function copyHTML(){
  const html = document.getElementById("editor").innerHTML;
  navigator.clipboard.writeText(html);
  alert("Kopyalandı");
}
</script>

</body>
</html>
