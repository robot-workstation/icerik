<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ürün Açıklama Oluşturucu</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5}
input,textarea{width:100%;margin-bottom:10px;padding:8px}
button{padding:10px 20px;cursor:pointer}
#output{white-space:pre-wrap;background:#fff;padding:15px;margin-top:20px}
</style>
</head>
<body>

<h2>Ürün İçerik Generator</h2>

<input id="title" placeholder="Ürün Başlığı">
<input id="brandLogo" placeholder="Marka Logo URL">
<input id="img1" placeholder="Görsel 1">
<input id="img2" placeholder="Görsel 2">
<input id="img3" placeholder="Görsel 3">
<input id="img4" placeholder="Görsel 4">

<textarea id="p1" placeholder="Paragraf 1"></textarea>
<textarea id="p2" placeholder="Paragraf 2"></textarea>
<textarea id="p3" placeholder="Paragraf 3"></textarea>
<textarea id="p4" placeholder="Paragraf 4"></textarea>

<input id="video" placeholder="YouTube Video ID">

<textarea id="specs" placeholder="Teknik Özellikler (Örnek: Özellik:Değer)"></textarea>

<button onclick="generate()">HTML Üret</button>

<div id="output"></div>

<script>
function generate(){
let title=document.getElementById("title").value;
let logo=document.getElementById("brandLogo").value;
let img1=document.getElementById("img1").value;
let img2=document.getElementById("img2").value;
let img3=document.getElementById("img3").value;
let img4=document.getElementById("img4").value;
let p1=document.getElementById("p1").value;
let p2=document.getElementById("p2").value;
let p3=document.getElementById("p3").value;
let p4=document.getElementById("p4").value;
let video=document.getElementById("video").value;
let specsRaw=document.getElementById("specs").value;

let specsHTML="";
specsRaw.split("\n").forEach(line=>{
let parts=line.split(":");
if(parts.length==2){
specsHTML+=`<tr><th>${parts[0]}</th><td>${parts[1]}</td></tr>`;
}
});

let html=`
<div class="product-detail-section-logo" style="display: grid; place-items: center; margin-bottom: 20px;">
<img src="${logo}" style="width:400px;">
</div>

<div class="product-detail-section">

<div class="paragraph-1">
<div class="product-info">
<h1>${title}</h1>
<p>${p1}</p>
</div>
<img src="${img1}">
</div>

<div class="paragraph-2">
<div class="product-info">
<h2>${title}</h2>
<p>${p2}</p>
</div>
<img src="${img2}">
</div>

<div class="paragraph-3">
<div class="product-info">
<h2>${title}</h2>
<p>${p3}</p>
</div>
<img src="${img3}">
</div>

<div class="paragraph-4">
<div class="product-info">
<h2>${title}</h2>
<p>${p4}</p>
</div>
<img src="${img4}">
</div>

<div class="video-section">
<h2>${title} | Video</h2>
<div class="video-container yt-lite" data-video-id="${video}">
<img src="https://i.ytimg.com/vi/${video}/hqdefault.jpg">
<div class="yt-playbtn"></div>
</div>
</div>

<div class="specs-container">
<h1 class="red-box">${title} | Teknik Özellikler</h1>
<table>
<thead>
<tr><th>Özellik</th><th>Değer</th></tr>
</thead>
<tbody>
${specsHTML}
</tbody>
</table>
</div>

</div>
`;

document.getElementById("output").innerText=html;
}
</script>

</body>
</html>
