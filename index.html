<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Editor</title>

<style>
body{
  margin:0;
  background:#e9e9e9;
  font-family:Arial;
}

/* TOP BAR */
.topbar{
  position:fixed;
  top:0;
  right:0;
  left:0;
  height:60px;
  background:#ffffff;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:0 20px;
  border-bottom:1px solid #ddd;
  z-index:10;
}

button{
  background:#2f6df6;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:6px;
  cursor:pointer;
}

/* MAIN */
.wrapper{
  margin-top:80px;
  padding:20px;
}

/* LOGO */
.logo{
  text-align:center;
  margin-bottom:20px;
}

/* BLOCK */
.block{
  background:#f2f2f2;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:30px;
}

.block.reverse{
  flex-direction:row-reverse;
}

.block img{
  width:500px;
  height:500px;
  object-fit:cover;
  border-radius:10px;
  background:#ddd;
  cursor:pointer;
}

.block .text{
  flex:1;
}

/* VIDEO */
.video{
  background:#f2f2f2;
  padding:20px;
  border-radius:10px;
}

.video iframe{
  width:100%;
  height:400px;
}

/* editable */
[contenteditable]:focus{
  outline:2px solid #2f6df6;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="copyHTML()">Kodu Kopyala</button>
</div>

<div class="wrapper" id="editor">

<div class="logo">
  <h2 contenteditable="true">ARTURIA</h2>
</div>

<div class="block reverse">
  <img src="https://placehold.co/500x500" onclick="changeImg(this)">
  <div class="text">
    <h2 contenteditable="true">Yeni Ses Fikirlerini Hızla Yakala</h2>
    <p contenteditable="true">Metin alanı...</p>
  </div>
</div>

<div class="block">
  <img src="https://placehold.co/500x500" onclick="changeImg(this)">
  <div class="text">
    <h2 contenteditable="true">Sequencer ile Sürprizleri Müziğe Çevir</h2>
    <p contenteditable="true">Metin alanı...</p>
  </div>
</div>

<div class="block reverse">
  <img src="https://placehold.co/500x500" onclick="changeImg(this)">
  <div class="text">
    <h2 contenteditable="true">Dijital Güç</h2>
    <p contenteditable="true">Metin alanı...</p>
  </div>
</div>

<div class="block">
  <img src="https://placehold.co/500x500" onclick="changeImg(this)">
  <div class="text">
    <h2 contenteditable="true">Bağlantılar</h2>
    <p contenteditable="true">Metin alanı...</p>
  </div>
</div>

<div class="video">
  <h2 contenteditable="true">Ürün Tanıtımı</h2>
  <iframe src="https://www.youtube.com/embed/gplOOccxkwE"></iframe>
</div>

</div>

<script>
function changeImg(el){
  let url = prompt("Resim URL gir:");
  if(url) el.src = url;
}

function copyHTML(){
  let html = document.getElementById("editor").innerHTML;
  navigator.clipboard.writeText(html);
  alert("Kopyalandı");
}
</script>

</body>
</html>
